<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Atlas</title>

</head>

          <mask id="vmB"><circle cx="1140" cy="590" r="520" fill="#fff"></circle><circle cx="660" cy="590" r="520" fill="#000"></circle><circle cx="900" cy="1000" r="520" fill="#000"></circle></mask>

      <div class="region-label micro">
        <div class="region-name">MICRO</div>
        <div class="region-desc">execution · aim, timing, muscle memory</div>
      </div>
      <div class="region-label macro">
        <div class="region-name">MACRO</div>
        <div class="region-desc">systems · strategy, routing, optimal play</div>
      </div>
      <div class="region-label meso">
        <div class="region-name">MESO</div>
        <div class="region-desc">mind games · reads, probability, hidden information</div>
      </div>
      <div id="icons"></div>
      <div id="dim" hidden></div>
      <div id="card-mount"></div>
    </div>
  </div>
  <header>
    <div class="brand">SurDex</div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="find a game" spellcheck="false" autocomplete="off">
      <div id="matches" hidden></div>
    </div>
  </header>
  <footer id="site-footer">Data from <a href="https://rawg.io" target="_blank" rel="noopener">RAWG</a></footer>
  <div id="intro">
    <div class="intro-pivot">
      <div class="intro-ring"></div>
      <div class="intro-ring"></div>
      <div class="intro-ring"></div>
    </div>
  </div>
</div>
<script src="games.js"></script>
<script src="data/games-api.js"></script>
<script src="app.js"></script>
</body>
</html>
